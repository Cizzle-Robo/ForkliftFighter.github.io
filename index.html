<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forklift Fencing: Warehouse Warfare</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        h2 {
            margin: 10px 0;
            font-size: 24px;
            color: #FFF;
        }
        #gameContainer {
            flex: 1;
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }
        canvas {
            background-color: #323232;
            border: 4px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            border-radius: 8px;
        }
        
        /* Screen Overlays */
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            bottom: 0;
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.9);
            display: none; /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            z-index: 10;
            overflow-y: auto;
        }
        
        /* Make Main Menu visible initially */
        #mainMenuScreen {
            display: flex; 
        }

        h1 {
            color: #FFD700;
            font-size: clamp(28px, 5vw, 52px);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h2.screen-title {
            color: #FFF;
            font-size: 32px;
            margin-bottom: 30px;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }
        
        .menu-btn {
            background: #444;
            color: #FFF;
            border: 2px solid #888;
            padding: 15px 30px;
            font-size: 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
            width: 300px;
            font-weight: bold;
        }
        .menu-btn:hover {
            background: #FFD700;
            color: #000;
            border-color: #FFF;
            transform: scale(1.05);
        }
        .back-btn {
            background: #222;
            margin-top: 30px;
            width: 200px;
            font-size: 16px;
        }

        /* Garage & Settings specific styling */
        .flex-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }
        .settings-box, .loadout-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #555;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            min-width: 250px;
        }
        label {
            font-weight: bold;
            color: #CCC;
        }
        select {
            background: #333;
            color: #fff;
            border: 1px solid #777;
            padding: 10px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
        }
        select:focus {
            border-color: #FFD700;
        }

        /* Bottom Controls Box */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #1a1a1a;
            border-top: 2px solid #333;
        }
        .player-card {
            background: #111;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid;
            width: 200px;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>Forklift Fencing</h2>
    
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="mainMenuScreen" class="screen-overlay">
            <h1>Warehouse Warfare</h1>
            <button class="menu-btn" onclick="startGame('AI')">VS AI (1 Player)</button>
            <button class="menu-btn" onclick="startGame('LOCAL')">Local Fight (2 Players)</button>
            <button class="menu-btn" onclick="showScreen('garageScreen')">Garage (Loadouts)</button>
            <button class="menu-btn" onclick="showScreen('settingsScreen')">Settings</button>
        </div>

        <div id="garageScreen" class="screen-overlay">
            <h2 class="screen-title">The Garage</h2>
            <div class="flex-container">
                <div class="loadout-box" style="border-color: #FFD700;">
                    <h3 style="color: #FFD700; margin: 0 0 10px 0;">Player 1 (Yellow)</h3>
                    <label>Chassis Type:</label>
                    <select id="p1Chassis">
                        <option value="standard">Standard (Balanced, 100 HP)</option>
                        <option value="bulldozer">Bulldozer (Heavy, 150 HP)</option>
                        <option value="speedster">Speedster (Fast, 60 HP)</option>
                        <option value="tank">Tank (Massive, 200 HP)</option>
                        <option value="drifter">Drifter (High Turn, 80 HP)</option>
                    </select>
                    <label>Weapon Type:</label>
                    <select id="p1Weapon">
                        <option value="standard">Standard Fork (Medium)</option>
                        <option value="greatsword">Greatsword (Long/Slow)</option>
                        <option value="rapier">Rapier (Short/Fast)</option>
                        <option value="lance">Lance (Extreme Reach/Slow)</option>
                        <option value="dagger">Dagger (Point Blank/Instant)</option>
                    </select>
                </div>
                <div class="loadout-box" style="border-color: #C83232;">
                    <h3 style="color: #C83232; margin: 0 0 10px 0;">Player 2 / AI (Red)</h3>
                    <label>Chassis Type:</label>
                    <select id="p2Chassis">
                        <option value="standard">Standard (Balanced, 100 HP)</option>
                        <option value="bulldozer">Bulldozer (Heavy, 150 HP)</option>
                        <option value="speedster">Speedster (Fast, 60 HP)</option>
                        <option value="tank">Tank (Massive, 200 HP)</option>
                        <option value="drifter">Drifter (High Turn, 80 HP)</option>
                    </select>
                    <label>Weapon Type:</label>
                    <select id="p2Weapon">
                        <option value="standard">Standard Fork (Medium)</option>
                        <option value="greatsword">Greatsword (Long/Slow)</option>
                        <option value="rapier">Rapier (Short/Fast)</option>
                        <option value="lance">Lance (Extreme Reach/Slow)</option>
                        <option value="dagger">Dagger (Point Blank/Instant)</option>
                    </select>
                </div>
            </div>
            <button class="menu-btn back-btn" onclick="showScreen('mainMenuScreen')">Back to Menu</button>
        </div>

        <div id="settingsScreen" class="screen-overlay">
            <h2 class="screen-title">Settings</h2>
            <div class="settings-box">
                <label>AI Difficulty:</label>
                <select id="aiDifficulty">
                    <option value="easy">Intern (Easy - Rare Parries)</option>
                    <option value="medium" selected>Foreman (Medium - Balanced)</option>
                    <option value="hard">Warehouse Manager (Hard - Godlike Reflexes)</option>
                </select>
            </div>
            <button class="menu-btn back-btn" onclick="showScreen('mainMenuScreen')">Back to Menu</button>
        </div>

        <div id="gameOverScreen" class="screen-overlay">
            <h1 id="winnerText" style="font-size: 60px;">Game Over</h1>
            <button class="menu-btn" onclick="showScreen('mainMenuScreen')">Return to Menu</button>
        </div>
    </div>

    <div class="controls">
        <div class="player-card" style="border-color: #FFD700;">
            <h3 style="color: #FFD700; margin: 0 0 10px 0; text-align: center;">Player 1</h3>
            <p style="margin: 5px 0;"><strong>Drive:</strong> W, S</p>
            <p style="margin: 5px 0;"><strong>Turn:</strong> A, D</p>
            <p style="margin: 5px 0;"><strong>Swing:</strong> SPACE</p>
            <p style="margin: 5px 0; color: #00FFFF;"><strong>Parry:</strong> E</p>
        </div>
        <div class="player-card" id="p2Card" style="border-color: #C83232;">
            <h3 style="color: #C83232; margin: 0 0 10px 0; text-align: center;">Player 2 / AI</h3>
            <p style="margin: 5px 0;"><strong>Drive:</strong> Up, Down</p>
            <p style="margin: 5px 0;"><strong>Turn:</strong> Left, Right</p>
            <p style="margin: 5px 0;"><strong>Swing:</strong> Right Shift</p>
            <p style="margin: 5px 0; color: #00FFFF;"><strong>Parry:</strong> / (Slash)</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let gameState = "MENU"; 
        let gameMode = "LOCAL"; 
        let animationFrameId;

        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        // --- SCREEN ROUTING ---
        function showScreen(screenId) {
            // Hide all screens
            const screens = document.querySelectorAll('.screen-overlay');
            screens.forEach(s => s.style.display = 'none');
            
            // Show the target screen
            if(screenId) {
                document.getElementById(screenId).style.display = 'flex';
                gameState = "MENU";
                resizeCanvas(); // Re-center players in background
            } else {
                gameState = "PLAYING"; // If no screenId, we are playing
            }
        }

        // --- EXPANDED GARAGE DATABASES ---
        const CHASSIS_DB = {
            standard:  { w: 40, h: 30, maxSpeed: 6.0, acc: 0.30, turn: 0.07, hp: 100 },
            bulldozer: { w: 50, h: 40, maxSpeed: 3.5, acc: 0.15, turn: 0.04, hp: 150 },
            speedster: { w: 32, h: 22, maxSpeed: 8.5, acc: 0.50, turn: 0.10, hp: 60  },
            tank:      { w: 60, h: 45, maxSpeed: 2.5, acc: 0.10, turn: 0.03, hp: 200 },
            drifter:   { w: 35, h: 25, maxSpeed: 7.0, acc: 0.20, turn: 0.15, hp: 80  }
        };

        const WEAPON_DB = {
            standard:   { length: 70,  swingSpeed: 0.25, retractSpeed: 0.10, damage: 20 },
            greatsword: { length: 100, swingSpeed: 0.12, retractSpeed: 0.04, damage: 40 },
            rapier:     { length: 45,  swingSpeed: 0.50, retractSpeed: 0.25, damage: 10 },
            lance:      { length: 140, swingSpeed: 0.08, retractSpeed: 0.05, damage: 30 },
            dagger:     { length: 25,  swingSpeed: 0.80, retractSpeed: 0.40, damage: 15 }
        };

        class Forklift {
            constructor(color, isPlayer1) {
                this.isPlayer1 = isPlayer1;
                this.color = color;
                this.swordTip = { x: 0, y: 0 };
                this.setLoadout("standard", "standard");
            }

            setLoadout(chassisId, weaponId) {
                this.chassisId = chassisId;
                this.weaponId = weaponId;
                this.stats = CHASSIS_DB[chassisId];
                this.weapon = WEAPON_DB[weaponId];
                this.reset();
            }

            reset() {
                if (this.isPlayer1) {
                    this.x = canvas.width * 0.15; 
                    this.angle = 0;
                } else {
                    this.x = canvas.width * 0.85; 
                    this.angle = Math.PI;
                }
                this.y = canvas.height / 2;

                this.health = this.stats.hp;
                this.speed = 0;
                
                this.swordAngle = 0;
                this.isSwinging = false;
                this.hasHitThisSwing = false;
                
                this.isBlocking = false;
                this.blockTimer = 0;
                this.blockCooldown = 0;
                this.maxBlockDuration = 15; 
                this.maxBlockCooldown = 60; 
                
                this.updatePositions();
            }

            move(forward, turn) {
                this.angle += turn * this.stats.turn;

                if (forward !== 0) {
                    this.speed += forward * this.stats.acc;
                } else {
                    this.speed *= 0.92; 
                }

                if (this.speed > this.stats.maxSpeed) this.speed = this.stats.maxSpeed;
                if (this.speed < -this.stats.maxSpeed / 2) this.speed = -this.stats.maxSpeed / 2;

                const newX = this.x + Math.cos(this.angle) * this.speed;
                const newY = this.y + Math.sin(this.angle) * this.speed;

                const bounds = this.stats.w / 2;
                if (newX > bounds && newX < canvas.width - bounds) {
                    this.x = newX;
                } else {
                    this.speed *= -0.5; 
                }
                
                if (newY > bounds && newY < canvas.height - bounds) {
                    this.y = newY;
                } else {
                    this.speed *= -0.5; 
                }
            }

            swing() {
                if (!this.isSwinging && this.swordAngle <= 0 && !this.isBlocking) {
                    this.isSwinging = true;
                    this.hasHitThisSwing = false;
                }
            }

            block() {
                if (!this.isSwinging && !this.isBlocking && this.blockCooldown === 0) {
                    this.isBlocking = true;
                    this.blockTimer = this.maxBlockDuration;
                    this.blockCooldown = this.maxBlockCooldown;
                }
            }

            updateAbilities() {
                if (this.isSwinging) {
                    this.swordAngle += this.weapon.swingSpeed;
                    if (this.swordAngle >= 2.0) {
                        this.isSwinging = false;
                    }
                } else {
                    if (this.swordAngle > 0) {
                        this.swordAngle -= this.weapon.retractSpeed;
                    } else {
                        this.swordAngle = 0;
                    }
                }

                if (this.isBlocking) {
                    this.blockTimer--;
                    if (this.blockTimer <= 0) {
                        this.isBlocking = false;
                    }
                }
                if (this.blockCooldown > 0) {
                    this.blockCooldown--;
                }

                this.updatePositions();
            }

            updatePositions() {
                const startOffset = this.stats.w / 2;
                const swordStartX = this.x + Math.cos(this.angle) * startOffset;
                const swordStartY = this.y + Math.sin(this.angle) * startOffset;
                const totalSwordAngle = this.angle + this.swordAngle - 0.8; 
                
                this.swordTip.x = swordStartX + Math.cos(totalSwordAngle) * this.weapon.length;
                this.swordTip.y = swordStartY + Math.sin(totalSwordAngle) * this.weapon.length;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.fillStyle = this.color;
                ctx.fillRect(-this.stats.w/2, -this.stats.h/2, this.stats.w, this.stats.h);
                
                ctx.fillStyle = "#000";
                ctx.fillRect(-5, -10, 15, 20);

                if (this.isBlocking) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.stats.w/2 + 15, -Math.PI/2, Math.PI/2);
                    ctx.strokeStyle = "#00FFFF";
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }

                ctx.restore();

                const startOffset = this.stats.w / 2;
                const swordStartX = this.x + Math.cos(this.angle) * startOffset;
                const swordStartY = this.y + Math.sin(this.angle) * startOffset;

                ctx.beginPath();
                ctx.moveTo(swordStartX, swordStartY);
                ctx.lineTo(this.swordTip.x, this.swordTip.y);
                
                if(this.weaponId === 'lance') ctx.lineWidth = 12;
                else if(this.weaponId === 'greatsword') ctx.lineWidth = 9;
                else if(this.weaponId === 'rapier' || this.weaponId === 'dagger') ctx.lineWidth = 3;
                else ctx.lineWidth = 6;
                
                ctx.strokeStyle = this.isSwinging ? "#FFFFFF" : "#969696";
                ctx.stroke();

                ctx.fillStyle = "#C80000";
                ctx.fillRect(this.x - 25, this.y - 35, 50, 5);
                ctx.fillStyle = "#00C800";
                const hpPercent = Math.max(0, this.health) / this.stats.hp;
                ctx.fillRect(this.x - 25, this.y - 35, 50 * hpPercent, 5);
                
                if (this.blockCooldown > 0 && !this.isBlocking) {
                    ctx.fillStyle = "#005555";
                    ctx.fillRect(this.x - 25, this.y - 42, 50, 3);
                    ctx.fillStyle = "#00FFFF";
                    const cdPercent = 1 - (this.blockCooldown / this.maxBlockCooldown);
                    ctx.fillRect(this.x - 25, this.y - 42, 50 * cdPercent, 3);
                }
            }
        }

        function resizeCanvas() {
            const container = document.getElementById("gameContainer");
            canvas.width = container.clientWidth - 40; 
            canvas.height = container.clientHeight;
            
            if (gameState === "MENU" && player1 && player2) {
                player1.x = canvas.width * 0.15;
                player1.y = canvas.height / 2;
                player2.x = canvas.width * 0.85;
                player2.y = canvas.height / 2;
                player1.updatePositions();
                player2.updatePositions();
            }
        }
        window.addEventListener("resize", resizeCanvas);

        let player1 = new Forklift("#FFD700", true);
        let player2 = new Forklift("#C83232", false);
        
        resizeCanvas();

        function checkCollision(attacker, defender) {
            if (attacker.isSwinging && !attacker.hasHitThisSwing) {
                const dx = attacker.swordTip.x - defender.x;
                const dy = attacker.swordTip.y - defender.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                const hitRadius = (defender.stats.w / 2) + 15;

                if (distance < hitRadius) { 
                    attacker.hasHitThisSwing = true; 

                    if (defender.isBlocking) {
                        const parryForce = 25; 
                        attacker.speed = 0; 
                        attacker.x -= Math.cos(attacker.angle) * parryForce;
                        attacker.y -= Math.sin(attacker.angle) * parryForce;
                        
                        defender.x += Math.cos(attacker.angle) * 3;
                        defender.y += Math.sin(attacker.angle) * 3;
                    } else {
                        defender.health -= attacker.weapon.damage; 
                        const knockbackForce = (attacker.weapon.damage * 1.5) / (defender.stats.hp / 100);
                        defender.speed = 0; 
                        defender.x += Math.cos(attacker.angle) * knockbackForce;
                        defender.y += Math.sin(attacker.angle) * knockbackForce;
                    }
                }
            }
        }

        function startGame(mode) {
            gameMode = mode;
            
            // Read Garage Values
            const p1C = document.getElementById("p1Chassis").value;
            const p1W = document.getElementById("p1Weapon").value;
            const p2C = document.getElementById("p2Chassis").value;
            const p2W = document.getElementById("p2Weapon").value;

            player1.setLoadout(p1C, p1W);
            player2.setLoadout(p2C, p2W);
            
            showScreen(null); // Passing null hides all menus and sets state to PLAYING
        }

        function endGame(winnerName) {
            document.getElementById("winnerText").innerText = winnerName + " Wins!";
            document.getElementById("winnerText").style.color = winnerName.includes("Player 1") ? "#FFD700" : "#C83232";
            showScreen("gameOverScreen");
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === "PLAYING") {
                let p1Forward = (keys["KeyW"] ? 1 : 0) - (keys["KeyS"] ? 1 : 0);
                let p1Turn = (keys["KeyD"] ? 1 : 0) - (keys["KeyA"] ? 1 : 0);
                player1.move(p1Forward, p1Turn);
                if (keys["Space"]) player1.swing();
                if (keys["KeyE"]) player1.block();

                let p2Forward = 0;
                let p2Turn = 0;

                if (gameMode === "LOCAL") {
                    p2Forward = (keys["ArrowUp"] ? 1 : 0) - (keys["ArrowDown"] ? 1 : 0);
                    p2Turn = (keys["ArrowRight"] ? 1 : 0) - (keys["ArrowLeft"] ? 1 : 0);
                    if (keys["ShiftRight"]) player2.swing();
                    if (keys["Slash"]) player2.block();
                } else if (gameMode === "AI") {
                    let dx = player1.x - player2.x;
                    let dy = player1.y - player2.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    let targetAngle = Math.atan2(dy, dx);
                    let diff = targetAngle - player2.angle;
                    
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;

                    // AI Difficulty settings
                    const aiLevel = document.getElementById("aiDifficulty").value;
                    let parryChance = 0.15;
                    let spacingSkill = 20;

                    if(aiLevel === "easy") { parryChance = 0.02; spacingSkill = 50; }
                    if(aiLevel === "hard") { parryChance = 0.60; spacingSkill = 10; }

                    if (diff > 0.1) p2Turn = 1;
                    else if (diff < -0.1) p2Turn = -1;

                    const optimalDistance = player2.weapon.length + (player1.stats.w / 2) + 20;

                    if (distance > optimalDistance + spacingSkill) {
                        p2Forward = 0.85; 
                    } else if (distance < optimalDistance - 15) {
                        p2Forward = -0.6; 
                    } else {
                        p2Forward = 0; 
                    }

                    if (distance < optimalDistance + 30 && Math.abs(diff) < 0.5) {
                        player2.swing();
                    }

                    if (player1.isSwinging && distance < player1.weapon.length + 50 && player2.blockCooldown === 0) {
                        if (Math.random() < parryChance) { 
                            player2.block();
                        }
                    }
                }
                
                player2.move(p2Forward, p2Turn);

                player1.updateAbilities();
                player2.updateAbilities();
                checkCollision(player1, player2);
                checkCollision(player2, player1);

                if (player1.health <= 0) {
                    endGame(gameMode === "AI" ? "The AI" : "Player 2");
                } else if (player2.health <= 0) {
                    endGame("Player 1");
                }
            }

            player1.draw();
            player2.draw();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        player1.updateAbilities();
        player2.updateAbilities();
        animationFrameId = requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
